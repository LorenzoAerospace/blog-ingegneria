        .controls label {
            display: block;
            margin-bottom: 5px;

        }
        .controls input[type="range"],

            width: 100%;
            background: #21262d;

            border-radius: 4px;
            color: var(--text-primary);
            padding: 8px;
            margin-top: 5px;
        }
        .controls input[type="range"]::-webkit-slider-thumb {
            background: var(--accent);
        }
        .reset-btn {
            grid-column: 1 / -1;
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }
    </style>
  </head>
